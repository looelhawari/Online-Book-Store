<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Add Book — The Modern Archive</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:wght@400;500;600&family=Public+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet"/>
</head>
<body class="bg-[#f8f9ff] text-[#0d1c2e] flex min-h-screen" style="font-family:'Public Sans',sans-serif">

<!-- SIDEBAR -->
<aside class="w-56 bg-[#0d1c2e] text-white flex flex-col shrink-0 min-h-screen">
  <div class="px-5 py-4 border-b border-[#233144]">
    <p class="font-semibold text-sm" style="font-family:'Newsreader',serif">The Modern Archive</p>
    <p class="text-[11px] text-[#7c839b] mt-0.5">Admin Panel</p>
  </div>
  <nav class="flex-1 px-3 py-3 space-y-0.5">
    <a th:href="@{/admin/dashboard}" class="flex items-center gap-3 px-3 py-2 rounded text-sm text-[#bec6e0] hover:bg-[#233144] transition-colors">
      <span class="material-symbols-outlined text-[18px]">dashboard</span> Dashboard
    </a>
    <a th:href="@{/admin/books}" class="flex items-center gap-3 px-3 py-2 rounded text-sm bg-[#233144] text-white">
      <span class="material-symbols-outlined text-[18px]">menu_book</span> Books
    </a>
    <a th:href="@{/admin/orders}" class="flex items-center gap-3 px-3 py-2 rounded text-sm text-[#bec6e0] hover:bg-[#233144] transition-colors">
      <span class="material-symbols-outlined text-[18px]">receipt_long</span> Orders
    </a>
  </nav>
  <div class="px-3 pb-4 border-t border-[#233144] pt-3">
    <a th:href="@{/admin/logout}" class="flex items-center gap-3 px-3 py-2 rounded text-sm text-[#bec6e0] hover:bg-[#233144] transition-colors">
      <span class="material-symbols-outlined text-[18px]">logout</span> Logout
    </a>
  </div>
</aside>

<div class="flex-1 flex flex-col">
  <header class="bg-white border-b border-[#c6c6cd] px-8 py-4 flex items-center gap-3">
    <a th:href="@{/admin/books}" class="text-[#45464d] hover:text-[#0d1c2e] p-1 hover:bg-[#eff4ff] rounded transition-colors">
      <span class="material-symbols-outlined">arrow_back</span>
    </a>
    <h1 class="text-xl font-semibold" style="font-family:'Newsreader',serif">Add New Book</h1>
  </header>

  <main class="flex-1 px-8 py-6 max-w-2xl">
    <div th:if="${error}" class="mb-4 p-3 bg-[#ffdad6] border border-red-200 rounded text-sm text-[#ba1a1a] flex items-center gap-2">
      <span class="material-symbols-outlined text-[18px]">error</span><span th:text="${error}"></span>
    </div>

    <div class="bg-white border border-[#c6c6cd] rounded-lg p-6">
      <form th:action="@{/admin/books/add}" method="post" class="space-y-4">
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div class="sm:col-span-2">
            <label class="block text-sm font-medium mb-1">Title <span class="text-[#ba1a1a]">*</span></label>
            <input name="title" type="text" required placeholder="Book title"
                   class="w-full px-3 py-2.5 border border-[#c6c6cd] rounded focus:outline-none focus:border-black focus:ring-1 focus:ring-black text-sm transition-colors"/>
          </div>
          <div>
            <label class="block text-sm font-medium mb-1">Author</label>
            <input name="author" type="text" placeholder="Author name"
                   class="w-full px-3 py-2.5 border border-[#c6c6cd] rounded focus:outline-none focus:border-black focus:ring-1 focus:ring-black text-sm transition-colors"/>
          </div>
          <div>
            <label class="block text-sm font-medium mb-1">Category</label>
            <input name="category" type="text" placeholder="e.g. Fiction, Design, Literature"
                   class="w-full px-3 py-2.5 border border-[#c6c6cd] rounded focus:outline-none focus:border-black focus:ring-1 focus:ring-black text-sm transition-colors"/>
          </div>
          <div class="sm:col-span-2">
            <label class="block text-sm font-medium mb-1">Cover Image URL</label>
            <input name="imageUrl" type="url" placeholder="https://example.com/book-cover.jpg"
                   class="w-full px-3 py-2.5 border border-[#c6c6cd] rounded focus:outline-none focus:border-black focus:ring-1 focus:ring-black text-sm transition-colors"/>
          </div>
        </div>
        <div>
          <label class="block text-sm font-medium mb-1">Description</label>
          <textarea name="description" rows="4" placeholder="Short description of the book…"
                    class="w-full px-3 py-2.5 border border-[#c6c6cd] rounded focus:outline-none focus:border-black focus:ring-1 focus:ring-black text-sm transition-colors resize-none"></textarea>
        </div>
        <div class="grid grid-cols-3 gap-4">
          <div>
            <label class="block text-sm font-medium mb-1">Price ($) <span class="text-[#ba1a1a]">*</span></label>
            <input name="price" type="number" step="0.01" min="0.01" required placeholder="0.00"
                   class="w-full px-3 py-2.5 border border-[#c6c6cd] rounded focus:outline-none focus:border-black focus:ring-1 focus:ring-black text-sm transition-colors"/>
          </div>
          <div>
            <label class="block text-sm font-medium mb-1">Quantity <span class="text-[#ba1a1a]">*</span></label>
            <input name="quantity" type="number" min="0" required placeholder="0"
                   class="w-full px-3 py-2.5 border border-[#c6c6cd] rounded focus:outline-none focus:border-black focus:ring-1 focus:ring-black text-sm transition-colors"/>
          </div>
          <div>
            <label class="block text-sm font-medium mb-1">Rating (0–5)</label>
            <input name="starRating" type="number" min="0" max="5" value="0"
                   class="w-full px-3 py-2.5 border border-[#c6c6cd] rounded focus:outline-none focus:border-black focus:ring-1 focus:ring-black text-sm transition-colors"/>
          </div>
        </div>
        <div class="flex gap-3 pt-2">
          <button type="submit"
                  class="px-5 py-2.5 bg-black text-white text-sm font-semibold rounded flex items-center gap-1.5 hover:bg-[#1a1a1a] transition-colors">
            <span class="material-symbols-outlined text-[18px]">add</span> Add Book
          </button>
          <a th:href="@{/admin/books}"
             class="px-5 py-2.5 border border-[#c6c6cd] text-sm rounded text-[#45464d] hover:bg-[#eff4ff] transition-colors">Cancel</a>
        </div>
      </form>
    </div>
  </main>
</div>
</body>
</html>
