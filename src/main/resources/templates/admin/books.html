<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Manage Books — The Modern Archive</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:wght@400;500;600&family=Public+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
  <script>tailwind.config={theme:{extend:{fontFamily:{display:['Newsreader','serif'],body:['Public Sans','sans-serif']}}}}</script>
</head>
<body class="bg-[#f8f9ff] text-[#0d1c2e] font-body flex min-h-screen">

<aside class="w-56 bg-[#0d1c2e] text-white flex flex-col shrink-0 min-h-screen">
  <div class="px-6 py-5 border-b border-[#233144]">
    <p class="font-display text-base font-semibold">The Modern Archive</p>
    <p class="text-xs text-[#7c839b] mt-0.5">Admin Panel</p>
  </div>
  <nav class="flex-1 px-3 py-4 space-y-1">
    <a th:href="@{/admin/dashboard}" class="flex items-center gap-3 px-3 py-2 rounded text-sm text-[#bec6e0] hover:bg-[#233144] transition-colors">
      <span class="material-symbols-outlined text-base">dashboard</span> Dashboard
    </a>
    <a th:href="@{/admin/books}" class="flex items-center gap-3 px-3 py-2 rounded text-sm bg-[#233144] text-white">
      <span class="material-symbols-outlined text-base">menu_book</span> Books
    </a>
    <a th:href="@{/admin/orders}" class="flex items-center gap-3 px-3 py-2 rounded text-sm text-[#bec6e0] hover:bg-[#233144] transition-colors">
      <span class="material-symbols-outlined text-base">receipt_long</span> Orders
    </a>
  </nav>
  <div class="px-3 py-4 border-t border-[#233144]">
    <a th:href="@{/admin/logout}" class="flex items-center gap-3 px-3 py-2 rounded text-sm text-[#bec6e0] hover:bg-[#233144] transition-colors">
      <span class="material-symbols-outlined text-base">logout</span> Logout
    </a>
  </div>
</aside>

<div class="flex-1 flex flex-col">
  <header class="bg-white border-b border-[#c6c6cd] px-8 py-4 flex items-center justify-between">
    <h1 class="font-display text-xl font-medium">Manage Books</h1>
    <a th:href="@{/admin/books/add}" class="px-4 py-2 bg-black text-white rounded text-sm font-medium hover:bg-[#1a1a1a] transition-colors flex items-center gap-2">
      <span class="material-symbols-outlined text-base">add</span> Add Book
    </a>
  </header>

  <main class="flex-1 px-8 py-6">
    <div th:if="${success}" class="mb-4 p-3 bg-green-50 border border-green-200 rounded text-sm text-green-800 flex items-center gap-2">
      <span class="material-symbols-outlined text-base">check_circle</span><span th:text="${success}"></span>
    </div>
    <div th:if="${error}" class="mb-4 p-3 bg-[#ffdad6] border border-red-200 rounded text-sm text-[#ba1a1a] flex items-center gap-2">
      <span class="material-symbols-outlined text-base">error</span><span th:text="${error}"></span>
    </div>

    <div class="bg-white border border-[#c6c6cd] rounded-lg overflow-hidden">
      <table class="w-full">
        <thead class="bg-[#eff4ff]">
          <tr>
            <th class="py-4 px-6 text-left text-xs font-semibold text-[#45464d] uppercase tracking-wider">Cover</th>
            <th class="py-4 px-6 text-left text-xs font-semibold text-[#45464d] uppercase tracking-wider">Title</th>
            <th class="py-4 px-6 text-left text-xs font-semibold text-[#45464d] uppercase tracking-wider hidden md:table-cell">Category</th>
            <th class="py-4 px-6 text-left text-xs font-semibold text-[#45464d] uppercase tracking-wider">Price</th>
            <th class="py-4 px-6 text-left text-xs font-semibold text-[#45464d] uppercase tracking-wider">Stock</th>
            <th class="py-4 px-6 text-left text-xs font-semibold text-[#45464d] uppercase tracking-wider">Actions</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-[#c6c6cd]">
          <tr th:each="book : ${books}" class="group hover:bg-[#f8f9ff] transition-colors">
            <td class="py-4 px-6">
              <div class="w-10 h-14 rounded overflow-hidden bg-[#dce9ff] border border-[#c6c6cd] flex items-center justify-center">
                <img th:if="${book.imageUrl != null and !#strings.isEmpty(book.imageUrl)}"
                     th:src="${book.imageUrl}" th:alt="${book.title}"
                     class="w-full h-full object-cover"
                     th:attr="onerror=|this.onerror=null;this.src='https://picsum.photos/seed/admin-book-${book.id}/80/112';|"/>
                <span th:if="${book.imageUrl == null or #strings.isEmpty(book.imageUrl)}"
                      class="material-symbols-outlined text-base text-[#7c839b]">menu_book</span>
              </div>
            </td>
            <td class="py-4 px-6">
              <p class="font-medium text-sm" th:text="${book.title}">Title</p>
              <div class="flex items-center gap-0.5 mt-0.5">
                <span th:each="i : ${#numbers.sequence(1, 5)}"
                      class="material-symbols-outlined text-xs"
                      th:classappend="${i <= book.starRating} ? 'text-yellow-500' : 'text-[#c6c6cd]'">star</span>
              </div>
            </td>
            <td class="py-4 px-6 text-sm text-[#45464d] hidden md:table-cell" th:text="${book.category}">Category</td>
            <td class="py-4 px-6 text-sm font-medium" th:text="'$' + ${#numbers.formatDecimal(book.price, 1, 2)}">$0.00</td>
            <td class="py-4 px-6">
              <span class="inline-flex items-center gap-1.5 text-sm"
                    th:classappend="${book.quantity == 0} ? 'text-[#45464d]' : (${book.quantity <= 5} ? 'text-orange-600' : 'text-green-600')">
                <span class="w-2 h-2 rounded-full"
                      th:classappend="${book.quantity == 0} ? 'bg-[#c6c6cd]' : (${book.quantity <= 5} ? 'bg-orange-500' : 'bg-green-500')"></span>
                <span th:text="${book.quantity}">0</span>
              </span>
            </td>
            <td class="py-4 px-6">
              <div class="flex items-center gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
                <a th:href="@{/admin/books/edit/{id}(id=${book.id})}"
                   class="p-1.5 border border-[#c6c6cd] rounded hover:bg-[#eff4ff] transition-colors text-[#45464d]">
                  <span class="material-symbols-outlined text-base">edit</span>
                </a>
                <form th:action="@{/admin/books/delete/{id}(id=${book.id})}" method="post"
                      onsubmit="return confirm('Delete this book?')">
                  <button type="submit"
                          class="p-1.5 border border-[#c6c6cd] rounded hover:bg-[#ffdad6] hover:border-red-300 transition-colors text-[#45464d] hover:text-[#ba1a1a]">
                    <span class="material-symbols-outlined text-base">delete</span>
                  </button>
                </form>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
      <div th:if="${books.isEmpty()}" class="py-12 text-center text-sm text-[#45464d]">
        No books found. <a th:href="@{/admin/books/add}" class="text-black font-medium hover:underline">Add the first one.</a>
      </div>
    </div>
  </main>
</div>
</body>
</html>
