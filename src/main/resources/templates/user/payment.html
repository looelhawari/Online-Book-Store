<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Payment — The Modern Archive</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:wght@400;500;600&family=Public+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
  <script>tailwind.config={theme:{extend:{fontFamily:{display:['Newsreader','serif'],body:['Public Sans','sans-serif']}}}}</script>
</head>
<body class="bg-[#f8f9ff] text-[#0d1c2e] font-body flex flex-col min-h-screen">

<header class="bg-white border-b border-[#c6c6cd] sticky top-0 z-50 shadow-sm">
  <div class="max-w-[1280px] mx-auto px-6 py-3 flex items-center justify-between gap-4">
    <a th:href="@{/catalog}" class="font-display text-xl font-semibold shrink-0">The Modern Archive</a>
    <div class="hidden sm:flex items-center gap-2 text-xs text-[#45464d]">
      <span class="flex items-center gap-1"><span class="w-5 h-5 rounded-full bg-[#0d1c2e] text-white flex items-center justify-center text-xs">✓</span> Cart</span>
      <span class="text-[#c6c6cd]">—</span>
      <span class="flex items-center gap-1"><span class="w-5 h-5 rounded-full bg-[#0d1c2e] text-white flex items-center justify-center text-xs">✓</span> Checkout</span>
      <span class="text-[#c6c6cd]">—</span>
      <span class="flex items-center gap-1 font-semibold text-[#0d1c2e]"><span class="w-5 h-5 rounded-full bg-black text-white flex items-center justify-center text-xs">3</span> Payment</span>
    </div>
    <div class="flex items-center gap-2">
      <a th:href="@{/privacy}" class="text-xs text-[#45464d] hover:text-[#0d1c2e] hidden lg:block">Privacy</a>
      <a th:href="@{/terms}" class="text-xs text-[#45464d] hover:text-[#0d1c2e] hidden lg:block">Terms</a>
      <a th:href="@{/contact}" class="text-xs text-[#45464d] hover:text-[#0d1c2e] hidden lg:block">Contact</a>
      <div class="flex items-center gap-1.5 pl-1">
        <span class="material-symbols-outlined text-[20px] text-[#45464d]">account_circle</span>
        <span class="text-sm font-medium hidden md:block" th:text="${session.user.name}">User</span>
      </div>
      <a th:href="@{/logout}" class="text-xs text-[#76777d] hover:text-[#ba1a1a] transition-colors hidden md:block">Logout</a>
    </div>
  </div>
</header>

<main class="flex-grow max-w-[1280px] mx-auto px-6 py-10 w-full">
  <div th:if="${error}" class="mb-6 p-3 bg-[#ffdad6] border border-red-200 rounded text-sm text-[#ba1a1a] flex items-center gap-2">
    <span class="material-symbols-outlined text-base">error</span><span th:text="${error}"></span>
  </div>

  <div class="max-w-lg mx-auto">
    <h1 class="font-display text-4xl font-semibold mb-2">Payment</h1>
    <p class="text-[#45464d] mb-8">Order <span class="font-medium text-[#0d1c2e]" th:text="'#' + ${order.id}"></span></p>

    <!-- Order total -->
    <div class="bg-white border border-[#c6c6cd] rounded-lg p-6 mb-6">
      <div class="flex justify-between items-center">
        <span class="text-[#45464d]">Order Total</span>
        <span class="font-display text-2xl font-semibold" th:text="'$' + ${#numbers.formatDecimal(order.totalPrice, 1, 2)}">$0.00</span>
      </div>
    </div>

    <!-- Demo payment form -->
    <div class="bg-white border border-[#c6c6cd] rounded-lg p-6 mb-6">
      <h2 class="font-display text-xl font-medium mb-4 flex items-center gap-2">
        <span class="material-symbols-outlined">credit_card</span> Card Details
      </h2>
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium mb-1">Card Number</label>
          <input type="text" placeholder="4242 4242 4242 4242" maxlength="19"
                 class="w-full px-4 py-2.5 border border-[#c6c6cd] rounded focus:outline-none focus:border-black focus:ring-1 focus:ring-black transition-colors"
                 id="cardNumber" oninput="formatCard(this)"/>
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-medium mb-1">Expiry</label>
            <input type="text" placeholder="MM/YY" maxlength="5"
                   class="w-full px-4 py-2.5 border border-[#c6c6cd] rounded focus:outline-none focus:border-black focus:ring-1 focus:ring-black transition-colors"/>
          </div>
          <div>
            <label class="block text-sm font-medium mb-1">CVV</label>
            <input type="text" placeholder="123" maxlength="4"
                   class="w-full px-4 py-2.5 border border-[#c6c6cd] rounded focus:outline-none focus:border-black focus:ring-1 focus:ring-black transition-colors"/>
          </div>
        </div>
        <div>
          <label class="block text-sm font-medium mb-1">Cardholder Name</label>
          <input type="text" th:value="${session.user.name}" placeholder="Name on card"
                 class="w-full px-4 py-2.5 border border-[#c6c6cd] rounded focus:outline-none focus:border-black focus:ring-1 focus:ring-black transition-colors"/>
        </div>
      </div>
      <p class="mt-3 text-xs text-[#45464d] flex items-center gap-1">
        <span class="material-symbols-outlined text-sm">info</span>
        Demo only — no real payment is processed.
      </p>
    </div>

    <!-- Submit -->
    <form th:action="@{/payment}" method="post">
      <input type="hidden" name="orderId" th:value="${order.id}"/>
      <button type="submit"
              class="w-full py-3 bg-black text-white rounded font-medium hover:bg-[#1a1a1a] transition-colors flex items-center justify-center gap-2 text-base">
        <span class="material-symbols-outlined">lock</span>
        Pay <span th:text="'$' + ${#numbers.formatDecimal(order.totalPrice, 1, 2)}">$0.00</span>
      </button>
    </form>
  </div>
</main>

<footer class="bg-[#e6eeff] border-t border-[#c6c6cd] mt-auto">
  <div class="max-w-[1280px] mx-auto px-6 py-6 flex flex-col sm:flex-row justify-between items-center gap-3 text-sm text-[#45464d]">
    <p class="font-display text-base font-medium text-[#0d1c2e]">The Modern Archive</p>
    <div class="flex gap-5">
      <a th:href="@{/privacy}" class="hover:text-[#0d1c2e] transition-colors">Privacy Policy</a>
      <a th:href="@{/terms}" class="hover:text-[#0d1c2e] transition-colors">Terms</a>
      <a th:href="@{/contact}" class="hover:text-[#0d1c2e] transition-colors">Contact</a>
    </div>
    <p>&copy; 2026 The Modern Archive.</p>
  </div>
</footer>
<script>
  function formatCard(el) {
    el.value = el.value.replace(/\D/g,'').replace(/(.{4})/g,'$1 ').trim().substring(0,19);
  }
</script>
</body>
</html>
