<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Orders — The Modern Archive Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:wght@400;500;600&family=Public+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
  <script>tailwind.config={theme:{extend:{fontFamily:{display:['Newsreader','serif'],body:['Public Sans','sans-serif']}}}}</script>
</head>
<body class="bg-[#f8f9ff] text-[#0d1c2e] font-body flex min-h-screen">

<aside class="w-56 bg-[#0d1c2e] text-white flex flex-col shrink-0 min-h-screen">
  <div class="px-6 py-5 border-b border-[#233144]">
    <p class="font-display text-base font-semibold">The Modern Archive</p>
    <p class="text-xs text-[#7c839b] mt-0.5">Admin Panel</p>
  </div>
  <nav class="flex-1 px-3 py-4 space-y-1">
    <a th:href="@{/admin/dashboard}" class="flex items-center gap-3 px-3 py-2 rounded text-sm text-[#bec6e0] hover:bg-[#233144] transition-colors">
      <span class="material-symbols-outlined text-base">dashboard</span> Dashboard
    </a>
    <a th:href="@{/admin/books}" class="flex items-center gap-3 px-3 py-2 rounded text-sm text-[#bec6e0] hover:bg-[#233144] transition-colors">
      <span class="material-symbols-outlined text-base">menu_book</span> Books
    </a>
    <a th:href="@{/admin/orders}" class="flex items-center gap-3 px-3 py-2 rounded text-sm bg-[#233144] text-white">
      <span class="material-symbols-outlined text-base">receipt_long</span> Orders
    </a>
  </nav>
  <div class="px-3 py-4 border-t border-[#233144]">
    <a th:href="@{/admin/logout}" class="flex items-center gap-3 px-3 py-2 rounded text-sm text-[#bec6e0] hover:bg-[#233144] transition-colors">
      <span class="material-symbols-outlined text-base">logout</span> Logout
    </a>
  </div>
</aside>

<div class="flex-1 flex flex-col">
  <header class="bg-white border-b border-[#c6c6cd] px-8 py-4">
    <h1 class="font-display text-xl font-medium">All Orders</h1>
  </header>

  <main class="flex-1 px-8 py-6">
    <div th:if="${success}" class="mb-4 p-3 bg-green-50 border border-green-200 rounded text-sm text-green-800 flex items-center gap-2">
      <span class="material-symbols-outlined text-base">check_circle</span><span th:text="${success}"></span>
    </div>
    <div th:if="${error}" class="mb-4 p-3 bg-[#ffdad6] border border-red-200 rounded text-sm text-[#ba1a1a] flex items-center gap-2">
      <span class="material-symbols-outlined text-base">error</span><span th:text="${error}"></span>
    </div>

    <div class="bg-white border border-[#c6c6cd] rounded-lg overflow-hidden">
      <table class="w-full">
        <thead class="bg-[#eff4ff]">
          <tr>
            <th class="py-4 px-6 text-left text-xs font-semibold text-[#45464d] uppercase tracking-wider">Order #</th>
            <th class="py-4 px-6 text-left text-xs font-semibold text-[#45464d] uppercase tracking-wider hidden md:table-cell">Customer</th>
            <th class="py-4 px-6 text-left text-xs font-semibold text-[#45464d] uppercase tracking-wider hidden lg:table-cell">Date</th>
            <th class="py-4 px-6 text-left text-xs font-semibold text-[#45464d] uppercase tracking-wider">Total</th>
            <th class="py-4 px-6 text-left text-xs font-semibold text-[#45464d] uppercase tracking-wider">Status</th>
            <th class="py-4 px-6 text-left text-xs font-semibold text-[#45464d] uppercase tracking-wider">Update</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-[#c6c6cd]">
          <tr th:each="order : ${orders}" class="hover:bg-[#f8f9ff] transition-colors">
            <td class="py-4 px-6 font-medium text-sm" th:text="'#' + ${order.id}"></td>
            <td class="py-4 px-6 text-sm text-[#45464d] hidden md:table-cell">
              <p th:text="${order.user.name}">Name</p>
              <p class="text-xs" th:text="${order.user.email}">email</p>
            </td>
            <td class="py-4 px-6 text-sm text-[#45464d] hidden lg:table-cell"
                th:text="${#temporals.format(order.createdAt, 'MMM dd, yyyy')}">Date</td>
            <td class="py-4 px-6 text-sm font-medium" th:text="'$' + ${#numbers.formatDecimal(order.totalPrice, 1, 2)}">$0.00</td>
            <td class="py-4 px-6">
              <span class="inline-flex items-center gap-1.5 text-sm"
                    th:classappend="${order.status.name() == 'CONFIRMED' or order.status.name() == 'SHIPPED'} ? 'text-green-700' : (${order.status.name() == 'CANCELLED'} ? 'text-red-700' : 'text-yellow-700')">
                <span class="w-2 h-2 rounded-full"
                      th:classappend="${order.status.name() == 'CONFIRMED' or order.status.name() == 'SHIPPED'} ? 'bg-green-500' : (${order.status.name() == 'CANCELLED'} ? 'bg-red-500' : 'bg-yellow-500')"></span>
                <span th:text="${order.status}">PENDING</span>
              </span>
            </td>
            <td class="py-4 px-6">
              <form th:action="@{/admin/orders/{id}/status(id=${order.id})}" method="post" class="flex items-center gap-2">
                <select name="status"
                        class="text-xs border border-[#c6c6cd] rounded px-2 py-1.5 focus:outline-none focus:border-black bg-white">
                  <option th:each="s : ${statuses}" th:value="${s}" th:text="${s}"
                          th:selected="${s == order.status}">STATUS</option>
                </select>
                <button type="submit"
                        class="text-xs px-2 py-1.5 bg-black text-white rounded hover:bg-[#1a1a1a] transition-colors">
                  Update
                </button>
              </form>
            </td>
          </tr>
        </tbody>
      </table>
      <div th:if="${orders.isEmpty()}" class="py-12 text-center text-sm text-[#45464d]">No orders yet.</div>
    </div>
  </main>
</div>
</body>
</html>
