<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Create Account — The Modern Archive</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:wght@400;500;600&family=Public+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
  <link th:href="@{/css/style.css}" rel="stylesheet"/>
  <script>tailwind.config={theme:{extend:{fontFamily:{display:['Newsreader','serif'],body:['Public Sans','sans-serif']}}}}</script>
</head>
<body class="bg-[#f8f9ff] text-[#0d1c2e] font-body min-h-screen flex items-center justify-center px-4 py-8">

  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <a th:href="@{/catalog}" class="font-display text-2xl font-semibold">The Modern Archive</a>
      <p class="text-sm text-[#45464d] mt-1">Create your account</p>
    </div>

    <div class="bg-white border border-[#c6c6cd] rounded-lg p-8 shadow-sm">
      <h1 class="font-display text-2xl font-medium mb-6">Join us</h1>

      <div th:if="${error}" class="mb-4 p-3 bg-[#ffdad6] border border-red-200 rounded text-sm text-[#ba1a1a] flex items-center gap-2">
        <span class="material-symbols-outlined text-base">error</span>
        <span th:text="${error}"></span>
      </div>

      <form th:action="@{/register}" method="post" class="space-y-4" id="registerForm">
        <div>
          <label for="name" class="block text-sm font-medium mb-1">Full Name</label>
          <input id="name" name="name" type="text" th:value="${name}"
                 placeholder="Your display name"
                 class="w-full px-4 py-2.5 border border-[#c6c6cd] rounded focus:outline-none focus:border-black focus:ring-1 focus:ring-black transition-colors"/>
        </div>
        <div>
          <label for="username" class="block text-sm font-medium mb-1">Username <span class="text-[#ba1a1a]">*</span></label>
          <input id="username" name="username" type="text" required th:value="${username}"
                 placeholder="3-20 chars, letters/numbers/underscore"
                 class="w-full px-4 py-2.5 border border-[#c6c6cd] rounded focus:outline-none focus:border-black focus:ring-1 focus:ring-black transition-colors"/>
        </div>
        <div>
          <label for="email" class="block text-sm font-medium mb-1">Email <span class="text-[#ba1a1a]">*</span></label>
          <input id="email" name="email" type="email" required th:value="${email}"
                 placeholder="you@example.com"
                 class="w-full px-4 py-2.5 border border-[#c6c6cd] rounded focus:outline-none focus:border-black focus:ring-1 focus:ring-black transition-colors"/>
        </div>
        <div>
          <label for="password" class="block text-sm font-medium mb-1">Password <span class="text-[#ba1a1a]">*</span></label>
          <div class="relative">
            <input id="password" name="password" type="password" required
                   placeholder="At least 6 characters"
                   class="w-full px-4 py-2.5 border border-[#c6c6cd] rounded focus:outline-none focus:border-black focus:ring-1 focus:ring-black transition-colors"/>
            <button type="button" onclick="togglePassword('password')" class="absolute right-3 top-1/2 -translate-y-1/2 text-[#45464d]">
              <span class="material-symbols-outlined text-lg">visibility</span>
            </button>
          </div>
        </div>
        <div>
          <label for="confirmPassword" class="block text-sm font-medium mb-1">Confirm Password <span class="text-[#ba1a1a]">*</span></label>
          <input id="confirmPassword" name="confirmPassword" type="password" required
                 placeholder="Repeat your password"
                 class="w-full px-4 py-2.5 border border-[#c6c6cd] rounded focus:outline-none focus:border-black focus:ring-1 focus:ring-black transition-colors"/>
        </div>
        <button type="submit"
                class="w-full bg-black text-white py-2.5 rounded font-medium hover:bg-[#1a1a1a] transition-colors">
          Create Account
        </button>
      </form>

      <p class="text-sm text-center text-[#45464d] mt-6">
        Already have an account?
        <a th:href="@{/login}" class="text-black font-medium hover:underline">Sign in</a>
      </p>
    </div>
  </div>

  <script>
    function togglePassword(id) {
      const el = document.getElementById(id);
      el.type = el.type === 'password' ? 'text' : 'password';
    }
  </script>
</body>
</html>
